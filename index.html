<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mille Splendidi Soli — Khaled Hosseini</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sand:    #f2e8d5;
    --parchment: #ede0c4;
    --ink:     #1a1108;
    --rust:    #8b3a2a;
    --gold:    #c9973a;
    --amber:   #e8a83e;
    --dusk:    #2e1f0e;
    --smoke:   #6e5c44;
    --cream:   #faf6ef;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--ink);
    color: var(--sand);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* ── CUSTOM CURSOR ── */
  .cursor {
    position: fixed; top: 0; left: 0; z-index: 9999;
    pointer-events: none;
  }
  .cursor-dot {
    width: 8px; height: 8px;
    background: var(--amber);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: transform .1s;
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1px solid rgba(201,151,58,.4);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: transform .18s ease, width .25s, height .25s, border-color .25s;
  }
  body:has(a:hover) .cursor-ring,
  body:has(button:hover) .cursor-ring {
    width: 52px; height: 52px;
    border-color: var(--amber);
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9998;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: .028;
    animation: grain 1.8s steps(6) infinite;
  }
  @keyframes grain {
    0%,100% { transform: translate(0,0); }
    20%      { transform: translate(-2%,-3%); }
    40%      { transform: translate(3%,2%); }
    60%      { transform: translate(-1%,4%); }
    80%      { transform: translate(2%,-1%); }
  }

  /* ── HERO ── */
  #hero {
    position: relative;
    height: 100vh; min-height: 620px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }

  .sky {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 30%,
      #4a2a0a 0%, #1a0d04 55%, #080402 100%);
  }

  /* Sun */
  .sun {
    position: absolute;
    top: 18%; left: 50%; transform: translateX(-50%);
    width: 160px; height: 160px;
  }
  .sun-core {
    position: absolute; inset: 25%;
    background: radial-gradient(circle, #ffe680, #f5a020 60%, transparent 100%);
    border-radius: 50%;
    box-shadow: 0 0 60px 30px rgba(245,160,32,.45),
                0 0 130px 70px rgba(200,100,20,.2);
    animation: pulse-sun 4s ease-in-out infinite;
  }
  @keyframes pulse-sun {
    0%,100% { box-shadow: 0 0 60px 30px rgba(245,160,32,.45), 0 0 130px 70px rgba(200,100,20,.2); }
    50%     { box-shadow: 0 0 80px 45px rgba(245,160,32,.55), 0 0 170px 90px rgba(200,100,20,.3); }
  }
  .sun-ray {
    position: absolute; top: 50%; left: 50%;
    width: 50%; height: 1.5px;
    transform-origin: 0 50%;
    background: linear-gradient(to right, rgba(255,220,80,.6), transparent);
    animation: spin-ray 12s linear infinite;
  }
  @keyframes spin-ray { to { transform: rotate(360deg); } }

  /* Stars */
  .stars { position: absolute; inset: 0; }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d,3s) ease-in-out infinite var(--del,0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: var(--a,.7); transform: scale(1); }
    50%     { opacity: .1; transform: scale(.6); }
  }

  /* Silhouette skyline */
  .skyline {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 40%;
  }
  .skyline svg { width: 100%; height: 100%; }

  /* Dust particles */
  .dust { position: absolute; inset: 0; pointer-events: none; }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(245,170,60,.5);
    border-radius: 50%;
    animation: float-particle var(--dur,15s) ease-in-out infinite var(--del2,0s);
  }
  @keyframes float-particle {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: .6; }
    100% { transform: translateY(-80vh) translateX(var(--dx,30px)); opacity: 0; }
  }

  /* Hero text */
  .hero-content {
    position: relative; z-index: 10;
    text-align: center;
    padding: 0 1.5rem;
    animation: hero-reveal 2.2s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes hero-reveal {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hero-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: clamp(.55rem, 1.3vw, .75rem);
    letter-spacing: .35em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 1.8rem;
    opacity: 0;
    animation: fade-up .9s ease .4s both;
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hero-title {
    font-family: 'IM Fell English', serif;
    font-size: clamp(3.2rem, 9vw, 8rem);
    font-weight: 400;
    line-height: .95;
    color: var(--sand);
    text-shadow: 0 4px 40px rgba(200,120,30,.35);
    margin-bottom: .6rem;
    opacity: 0;
    animation: fade-up 1.1s ease .7s both;
  }
  .hero-title em {
    display: block;
    font-style: italic;
    color: var(--amber);
    font-size: .85em;
  }
  .hero-number {
    font-family: 'Cinzel', serif;
    font-size: clamp(4rem, 12vw, 11rem);
    color: transparent;
    -webkit-text-stroke: 1px rgba(201,151,58,.3);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    z-index: -1;
    pointer-events: none;
    user-select: none;
    animation: fade-num 2.5s ease 0s both;
  }
  @keyframes fade-num {
    from { opacity: 0; transform: translate(-50%,-50%) scale(1.15); }
    to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }
  .hero-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(.9rem, 2vw, 1.25rem);
    font-style: italic;
    color: rgba(242,232,213,.65);
    margin-top: 1.4rem;
    letter-spacing: .06em;
    opacity: 0;
    animation: fade-up .9s ease 1.1s both;
  }
  .hero-author {
    font-family: 'Cinzel', serif;
    font-size: clamp(.6rem, 1.4vw, .8rem);
    letter-spacing: .25em;
    color: var(--gold);
    margin-top: 2.2rem;
    opacity: 0;
    animation: fade-up .8s ease 1.4s both;
  }
  .scroll-cue {
    position: absolute; bottom: 2.5rem; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    gap: .5rem;
    font-family: 'Cinzel', serif;
    font-size: .55rem;
    letter-spacing: .25em;
    color: rgba(201,151,58,.5);
    opacity: 0;
    animation: fade-up .8s ease 2s both;
  }
  .scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, transparent, var(--amber));
    animation: scroll-pulse 2.2s ease-in-out infinite;
  }
  @keyframes scroll-pulse {
    0%,100% { opacity: .4; transform: scaleY(.6); transform-origin: top; }
    50%     { opacity: 1; transform: scaleY(1); }
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.4rem 3rem;
    transition: background .4s, backdrop-filter .4s;
  }
  nav.scrolled {
    background: rgba(12,7,2,.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(201,151,58,.1);
  }
  .nav-logo {
    font-family: 'Cinzel', serif;
    font-size: .75rem;
    letter-spacing: .2em;
    color: var(--amber);
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-family: 'Raleway', sans-serif;
    font-size: .68rem;
    font-weight: 300;
    letter-spacing: .18em;
    color: rgba(242,232,213,.6);
    text-decoration: none;
    text-transform: uppercase;
    transition: color .3s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute; bottom: -3px; left: 0;
    width: 0; height: 1px;
    background: var(--amber);
    transition: width .3s;
  }
  .nav-links a:hover { color: var(--amber); }
  .nav-links a:hover::after { width: 100%; }

  /* ── EPIGRAPH BAND ── */
  .epigraph-band {
    background: linear-gradient(135deg, var(--rust) 0%, #5a1e12 100%);
    padding: 4rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .epigraph-band::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9973a' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .epigraph-band blockquote {
    position: relative;
    max-width: 720px; margin: 0 auto;
    font-size: clamp(1.1rem, 2.5vw, 1.65rem);
    font-style: italic;
    font-weight: 300;
    line-height: 1.7;
    color: var(--sand);
  }
  .epigraph-band blockquote::before {
    content: '\201C';
    font-size: 6rem;
    color: rgba(201,151,58,.25);
    line-height: 0;
    vertical-align: -2.5rem;
    font-family: 'IM Fell English', serif;
  }
  .epigraph-attr {
    margin-top: 1.4rem;
    font-family: 'Cinzel', serif;
    font-size: .7rem;
    letter-spacing: .2em;
    color: var(--amber);
  }

  /* ── SECTION BASE ── */
  section { padding: 7rem 0; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 2.5rem; }
  .section-label {
    font-family: 'Cinzel', serif;
    font-size: .62rem;
    letter-spacing: .35em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .section-label::after {
    content: '';
    flex: 1; max-width: 60px;
    height: 1px;
    background: linear-gradient(to right, var(--amber), transparent);
  }
  .section-heading {
    font-family: 'IM Fell English', serif;
    font-size: clamp(2rem, 4vw, 3.5rem);
    font-weight: 400;
    line-height: 1.15;
    color: var(--sand);
    margin-bottom: 2.5rem;
  }
  .section-heading em { color: var(--amber); font-style: italic; }

  /* ── BOOK PRESENTATION ── */
  #presentazione {
    background: var(--ink);
    position: relative;
  }
  #presentazione::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }
  .pres-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6rem;
    align-items: center;
  }
  .pres-cover {
    position: relative;
  }
  .book-3d {
    position: relative;
    width: 240px; height: 340px;
    margin: 0 auto;
    transform: perspective(900px) rotateY(-14deg) rotateX(3deg);
    transition: transform .6s ease;
    filter: drop-shadow(-30px 40px 50px rgba(0,0,0,.7));
  }
  .book-3d:hover {
    transform: perspective(900px) rotateY(-4deg) rotateX(1deg);
  }
  .book-face {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #5a1e12 0%, #3a0e06 100%);
    border-radius: 3px 8px 8px 3px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .book-face::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to right, rgba(0,0,0,.4) 0%, transparent 15%),
      linear-gradient(135deg, rgba(255,200,100,.08) 0%, transparent 60%);
  }
  .book-title-cover {
    font-family: 'IM Fell English', serif;
    font-size: 1.4rem;
    text-align: center;
    color: var(--sand);
    line-height: 1.2;
    margin-bottom: 1rem;
    position: relative;
  }
  .book-title-cover em { color: var(--amber); display: block; }
  .book-ornament {
    width: 80px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: .8rem auto;
    position: relative;
  }
  .book-ornament::before {
    content: '✦';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    color: var(--gold);
    font-size: .7rem;
    background: #3a0e06;
    padding: 0 .5rem;
  }
  .book-author-cover {
    font-family: 'Cinzel', serif;
    font-size: .6rem;
    letter-spacing: .2em;
    color: var(--amber);
  }
  .book-sun-cover {
    position: absolute;
    top: 10%; right: 10%;
    width: 60px; height: 60px;
    opacity: .25;
  }
  .book-sun-cover circle { fill: #f5a020; }

  .pres-text .lead {
    font-size: clamp(1.05rem, 1.8vw, 1.3rem);
    line-height: 1.8;
    color: rgba(242,232,213,.8);
    margin-bottom: 1.8rem;
  }
  .pres-meta {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
    margin-top: 2.5rem;
  }
  .meta-item {
    border-left: 2px solid var(--rust);
    padding-left: 1rem;
  }
  .meta-label {
    font-family: 'Cinzel', serif;
    font-size: .55rem;
    letter-spacing: .25em;
    color: var(--smoke);
    text-transform: uppercase;
    margin-bottom: .25rem;
  }
  .meta-value {
    font-size: 1rem;
    color: var(--sand);
  }

  /* ── TRAMA ── */
  #trama {
    background: linear-gradient(180deg, var(--dusk) 0%, #100a04 100%);
    position: relative;
  }
  .trama-layout {
    display: grid;
    grid-template-columns: 1fr 3fr;
    gap: 5rem;
  }
  .trama-sidebar {
    display: flex; flex-direction: column;
    gap: 2rem;
    padding-top: 1rem;
  }
  .char-card {
    border: 1px solid rgba(201,151,58,.15);
    padding: 1.4rem;
    background: rgba(255,255,255,.02);
    transition: border-color .3s, background .3s, transform .3s;
    position: relative;
    overflow: hidden;
  }
  .char-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--rust);
    transform: scaleY(0);
    transform-origin: top;
    transition: transform .35s ease;
  }
  .char-card:hover {
    border-color: rgba(201,151,58,.4);
    background: rgba(255,255,255,.05);
    transform: translateX(4px);
  }
  .char-card:hover::before { transform: scaleY(1); }
  .char-name {
    font-family: 'Cinzel', serif;
    font-size: .8rem;
    letter-spacing: .12em;
    color: var(--amber);
    margin-bottom: .5rem;
  }
  .char-desc {
    font-size: .88rem;
    line-height: 1.6;
    color: rgba(242,232,213,.6);
  }
  .trama-body p {
    font-size: clamp(1rem, 1.5vw, 1.15rem);
    line-height: 1.9;
    color: rgba(242,232,213,.78);
    margin-bottom: 1.6rem;
  }
  .trama-body p:first-child::first-letter {
    font-family: 'IM Fell English', serif;
    font-size: 4.5rem;
    line-height: .8;
    float: left;
    margin: .1rem .6rem 0 0;
    color: var(--amber);
    text-shadow: 3px 3px 0 rgba(139,58,42,.4);
  }

  /* ── TEMI ── */
  #temi { background: var(--ink); }
  .temi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2px;
    margin-top: 3rem;
  }
  .tema-block {
    padding: 2.8rem 2.2rem;
    background: rgba(255,255,255,.02);
    border: 1px solid rgba(201,151,58,.08);
    position: relative;
    overflow: hidden;
    transition: background .4s, transform .3s;
  }
  .tema-block::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--rust) 0%, transparent 70%);
    opacity: 0;
    transition: opacity .4s;
  }
  .tema-block:hover { background: rgba(255,255,255,.05); transform: translateY(-4px); }
  .tema-block:hover::before { opacity: .07; }
  .tema-num {
    font-family: 'Cinzel', serif;
    font-size: 3.5rem;
    color: rgba(201,151,58,.12);
    font-weight: 600;
    line-height: 1;
    margin-bottom: 1rem;
  }
  .tema-title {
    font-family: 'IM Fell English', serif;
    font-size: 1.4rem;
    color: var(--sand);
    margin-bottom: .9rem;
    position: relative;
  }
  .tema-text {
    font-size: .95rem;
    line-height: 1.75;
    color: rgba(242,232,213,.6);
    position: relative;
  }

  /* ── CONTESTO STORICO ── */
  #contesto {
    background: linear-gradient(180deg, #100a04 0%, var(--dusk) 100%);
    position: relative;
    overflow: hidden;
  }
  .timeline {
    position: relative;
    padding-left: 2.5rem;
  }
  .timeline::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--rust), var(--gold), transparent);
  }
  .tl-item {
    position: relative;
    margin-bottom: 3rem;
    opacity: 0;
    transform: translateX(-20px);
    transition: opacity .7s ease, transform .7s ease;
  }
  .tl-item.visible { opacity: 1; transform: translateX(0); }
  .tl-dot {
    position: absolute; left: -2.5rem; top: .4rem;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--rust);
    border: 2px solid var(--amber);
    box-shadow: 0 0 10px rgba(201,151,58,.4);
  }
  .tl-year {
    font-family: 'Cinzel', serif;
    font-size: .75rem;
    letter-spacing: .2em;
    color: var(--amber);
    margin-bottom: .5rem;
  }
  .tl-title {
    font-family: 'IM Fell English', serif;
    font-size: 1.2rem;
    color: var(--sand);
    margin-bottom: .5rem;
  }
  .tl-text {
    font-size: .95rem;
    line-height: 1.75;
    color: rgba(242,232,213,.6);
  }
  .contesto-bg-text {
    position: absolute; right: -2rem; top: 5rem;
    font-family: 'Cinzel', serif;
    font-size: 12rem;
    color: transparent;
    -webkit-text-stroke: 1px rgba(201,151,58,.05);
    pointer-events: none;
    user-select: none;
    writing-mode: vertical-rl;
    line-height: 1;
  }

  /* ── STILE ── */
  #stile {
    background: var(--ink);
    position: relative;
  }
  .stile-columns {
    columns: 2; gap: 4rem;
    font-size: clamp(.95rem, 1.4vw, 1.1rem);
    line-height: 1.9;
    color: rgba(242,232,213,.75);
  }
  .stile-columns p { break-inside: avoid; margin-bottom: 1.4rem; }
  .stile-pull {
    column-span: all;
    font-family: 'IM Fell English', serif;
    font-size: clamp(1.3rem, 2.5vw, 1.8rem);
    font-style: italic;
    color: var(--amber);
    text-align: center;
    padding: 2.5rem 0;
    border-top: 1px solid rgba(201,151,58,.2);
    border-bottom: 1px solid rgba(201,151,58,.2);
    margin: 1.5rem 0;
    line-height: 1.5;
  }

  /* ── AUTORE ── */
  #autore {
    background: linear-gradient(135deg, var(--dusk) 0%, #100a04 100%);
  }
  .autore-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 5rem;
    align-items: start;
  }
  .autore-portrait {
    position: sticky; top: 5rem;
  }
  .portrait-frame {
    width: 100%;
    aspect-ratio: 3/4;
    background: linear-gradient(145deg, #3a1808, #1e0c04);
